networks:
  apisix-net:
    driver: bridge

services:
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.0
    container_name: proyek-apisix-etcd
    command:
      - /usr/local/bin/etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
    networks:
      - apisix-net
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  apisix:
    image: apache/apisix:latest
    container_name: proyek-apisix-apisix
    volumes:
      - ./apisix_config/config.yaml:/usr/local/apisix/conf/config.yaml
    ports:
      - "9080:9080"
      - "9180:9180"
    networks:
      - apisix-net
    depends_on:
      etcd:
        condition: service_healthy
    restart: unless-stopped

  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: proyek-apisix-skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - apisix-net
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -sf http://localhost:12800/internal/l7check || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: proyek-apisix-skywalking-ui
    ports:
      - "8080:8080"
    environment:
      - SW_OAP_ADDRESS=http://skywalking-oap:12800
    networks:
      - apisix-net
    depends_on:
      skywalking-oap:
        condition: service_healthy
    restart: unless-stopped

  fortress-ldap:
    image: osixia/openldap:1.5.0
    container_name: proyek-apisix-fortress-ldap
    ports:
      - "389:389"
    environment:
      - LDAP_ORGANISATION=Apache Fortress
      - LDAP_DOMAIN=example.com
      - LDAP_ADMIN_PASSWORD=secret
    networks:
      - apisix-net
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: si-alat-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: si_alat
      MYSQL_USER: sialat
      MYSQL_PASSWORD: sialat123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - apisix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: si-alat-app
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: sialat
      DB_PASSWORD: sialat123
      DB_NAME: si_alat
      JWT_SECRET: si-alat-super-secret-key-2024
      JWT_EXPIRES_IN: 15m
      NODE_ENV: production
      SW_AGENT_NAME: "si-alat-backend"
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: "proyek-apisix-skywalking-oap:11800"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      skywalking-oap:
        condition: service_healthy
    networks:
      - apisix-net

volumes:
  mysql_data:

